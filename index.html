<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCRM </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="#"></a>Dashboard</li>
            <li><a href="#"></a>Clients</li>
            <li><a href="#"></a>Cases</li>
            <li><a href="#"></a>Invoices</li>
            <li><a href="#"></a>settings</li>   
        </ul>
    </nav>


   

    <main>
        <h1>Welcome to CrM</h1>
        <div class="main-container">
            <div class="left-column">
        <section class="card">
            <h2>Add client</h2>
            <form id="clientForm">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Client full name " required>
                
                <label for="rate">Hourly rate (USD)</label>
                <input type="number" id="rate" placeholder="eg:150" min="0" required>
                
                <label for="caseType">Case type</label>
                <select  id="caseType" required>
                    <option value="">-- Select --</option>
                    <option value="Mental Health Law">Mental Health Law</option>
                    <option value="Estate planning">Estate planning</option>
                    <option value="Other">Other</option>
                </select>

                <button type="submit">Add client</button>
                </form>
            </section>


         <section class="card">
            <h2>Track time</h2>
            <div class="timer-row">
                <label for="timerClientSelect">Client</label>
                <select name="" id="timerClientSelect">
                    <option value="">--Select--</option>
                </select>  
            </div>

            <div class="timer-row">
                <label for="timerTask">Task</label>
                <input type="text" placeholder="e.g task details" id="timerTask">
            </div>

            <div class="timer-controls">
                <button id="startBtn" class="btn-primary">Start</button>
                <button id="stopBtn" class="btn-danger">Stop</button> 
                <span class="elapsed" id="elapsed">00:00:00</span>
                <p class="hint"> </p>
            </div>
         </section>
           
        </div>
    



<div class="right-column">
            <section class="card">
                <h2>Clients</h2>
                <table id="clientTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Case type</th>
                        <th>Rate</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                    <tbody></tbody>
                </table>
         </section>

       

        

         <section class="card">
            <h2>Task history</h2>
            <label for="currentFilter"></label>
            <select  id="currentFilter">
                <option value="">Filter</option>

            </select>
            <button id="exportCSV">Export CSV</button>
            <table id="taskTable">
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Tasks</th>
                        <th>Start</th>
                        <th>End</th>
                        <th>Hours</th>
                        <th>Rate ($/h)</th>
                        <th>Total ($)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
         </section>
        </div>
        </div> 


    </main>




 </div>
 <footer><p>&copy; 2025 Law Office Dashboard. All rights reserved.</p></footer>
    
    <script src="js/script.js"></script>
</body>
</html>
